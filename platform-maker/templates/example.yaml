# -----------------------------------------------------------------------------
# CURRENCY CONFIGURATION
# -----------------------------------------------------------------------------
currencies:
  default: "USD"
  supported:
    - code: "USD"
      name: "US Dollar"
      symbol: "$"
      symbolPosition: "before"
      decimalPlaces: 2
      thousandSeparator: ","
      decimalSeparator: "."
      isActive: true
      isDefault: true

    - code: "BRL"
      name: "Brazilian Real"
      symbol: "R$"
      symbolPosition: "before"
      decimalPlaces: 2
      thousandSeparator: "."
      decimalSeparator: ","
      isActive: true
      isDefault: false

    - code: "EUR"
      name: "Euro"
      symbol: "€"
      symbolPosition: "after"
      decimalPlaces: 2
      thousandSeparator: " "
      decimalSeparator: ","
      isActive: true
      isDefault: false

    - code: "GBP"
      name: "British Pound"
      symbol: "£"
      symbolPosition: "before"
      decimalPlaces: 2
      thousandSeparator: ","
      decimalSeparator: "."
      isActive: true
      isDefault: false

# -----------------------------------------------------------------------------
# COUNTRY-SPECIFIC PRICING
# -----------------------------------------------------------------------------
countryPricing:
  - countryCode: "BR"
    currencyCode: "BRL"
    prices:
      core:
        priceCents: 4990                 # R$49.90
        bumpPriceCents: 6000             # R$60 for upgrade
        bumpRegularCents: 7500           # Regular difference
        bumpSavingsCents: 1500           # Save R$15
      growth:
        priceCents: 12490                # R$124.90
        bumpPriceCents: 12500
        bumpRegularCents: 15000
        bumpSavingsCents: 2500
      quantum:
        priceCents: 27490                # R$274.90
    isActive: true

  - countryCode: "MX"
    currencyCode: "MXN"
    prices:
      core:
        priceCents: 17900                # MXN$179
      growth:
        priceCents: 44900
      quantum:
        priceCents: 98900
    isActive: true

# -----------------------------------------------------------------------------
# REFERRAL PROGRAM
# -----------------------------------------------------------------------------
referral:
  enabled: true

  discount:
    type: "percentage"                   # "percentage" or "fixed"
    value: 25                            # 25% off
    applicableTiers:
      - "core"
      - "growth"
      - "quantum"

  codeGeneration:
    prefix: ""                           # No prefix
    length: 8
    characters: "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789"

  milestones:
    - count: 5                           # After 5 referrals
      fromTier: "core"
      toTier: "growth"
      description: "Upgrade to Growth Guild"

    - count: 5
      fromTier: "growth"
      toTier: "quantum"
      description: "Upgrade to Quantum Collective"

    - count: 5
      fromTier: "quantum"
      toTier: "secret"
      description: "Unlock Secret Agents"

  tracking:
    cookieDuration: 30                   # Days to track referral
    attributionWindow: 7                 # Days after click to attribute purchase

# -----------------------------------------------------------------------------
# PAYMENT PROVIDER
# -----------------------------------------------------------------------------
payment:
  provider: "square"

  square:
    environment: "production"            # "sandbox" or "production"
    locationId: "${SQUARE_LOCATION_ID}"
    accessToken: "${SQUARE_ACCESS_TOKEN}"
    applicationId: "${SQUARE_APPLICATION_ID}"
    webhookSignatureKey: "${SQUARE_WEBHOOK_SIGNATURE_KEY}"

    redirectUrls:
      success: "/confirmation"
      cancel: "/checkout"

    processingCurrency: "USD"            # Always charge in USD

# -----------------------------------------------------------------------------
# INTERNATIONALIZATION
# -----------------------------------------------------------------------------
i18n:
  defaultLanguage: "en"

  supportedLanguages:
    - code: "en"
      name: "English"
      nativeName: "English"
      direction: "ltr"
      isDefault: true

    - code: "pt"
      name: "Portuguese"
      nativeName: "Português"
      direction: "ltr"
      isDefault: false

    - code: "es"
      name: "Spanish"
      nativeName: "Español"
      direction: "ltr"
      isDefault: false

  urlStrategy: "path"                    # /en/page, /pt/page, /es/page

  fallback:
    language: "en"
    strategy: "fallback"                 # Show English if translation missing

  detection:
    order:
      - "path"
      - "cookie"
      - "navigator"
    cookieName: "i18next"
    lookupFromPathIndex: 0

# -----------------------------------------------------------------------------
# DEPLOYMENT CONFIGURATION
# -----------------------------------------------------------------------------
deployment:
  development:
    database:
      type: "sqlite"
      path: "./data/dev.db"
    server:
      port: 5000
      host: "localhost"
    client:
      port: 3000
      host: "localhost"

  production:
    database:
      type: "postgres"
      connectionString: "${DATABASE_URL}"
      poolSize: 10
      ssl: true
    server:
      port: 5000
      host: "0.0.0.0"
    client:
      buildOutput: "./dist/public"

    docker:
      enabled: true
      baseImage: "node:22-alpine"
      registry: "ghcr.io"
      imageName: "zaarvy"

    ssl:
      enabled: true
      provider: "letsencrypt"
      email: "support@zaarvy.com"

    nginx:
      enabled: true
      serverName: "zaarvy.com"
      wwwRedirect: true

  requiredEnvVars:
    - "DATABASE_URL"
    - "JWT_SECRET"
    - "SQUARE_ACCESS_TOKEN"
    - "SQUARE_APPLICATION_ID"
    - "SQUARE_LOCATION_ID"
    - "SQUARE_WEBHOOK_SIGNATURE_KEY"

  optionalEnvVars:
    - name: "RESEND_API_KEY"
      description: "For sending transactional emails"
    - name: "RESEND_FROM_EMAIL"
      description: "From address for emails"
    - name: "AWS_ACCESS_KEY_ID"
      description: "For S3 file storage"
    - name: "AWS_SECRET_ACCESS_KEY"
      description: "For S3 file storage"
    - name: "AWS_S3_BUCKET"
      description: "S3 bucket name"
    - name: "EXCHANGE_RATE_API_KEY"
      description: "For real-time currency conversion"
