# =============================================================================
# Platform Configuration Example
# =============================================================================
# This is a complete example configuration for generating a SaaS platform.
# Copy this file, customize the values, and run the generator skill.
#
# See PLATFORM_CONFIG_SCHEMA.md for complete field documentation.
# =============================================================================

# -----------------------------------------------------------------------------
# BRAND CONFIGURATION
# -----------------------------------------------------------------------------
brand:
  name: "Zaarvy AI"
  slug: "zaarvy"
  domain: "zaarvy.com"
  tagline: "Your AI Agent Command Center"
  description: "Access a curated crew of AI agents for marketing, content, and business growth."

  colors:
    primary: "#8B5CF6"        # Main brand color (purple)
    secondary: "#A78BFA"      # Secondary accent
    accent: "#C4B5FD"         # Highlights
    background: "#0F0F23"     # Page background
    foreground: "#FFFFFF"     # Text color
    muted: "#6B7280"          # Secondary text
    border: "#374151"         # Border color

    # Tier-specific colors
    tiers:
      core:
        bg: "#1E1B4B"
        text: "#22D3EE"
        border: "#0E7490"
        gradient: "from-cyan-900/20 to-transparent"
      growth:
        bg: "#14532D"
        text: "#84CC16"
        border: "#3F6212"
        gradient: "from-lime-900/20 to-transparent"
      quantum:
        bg: "#7C2D12"
        text: "#FB923C"
        border: "#9A3412"
        gradient: "from-orange-900/20 to-transparent"

  assets:
    logo: "/logo.svg"
    favicon: "/favicon.ico"
    ogImage: "/og-image.png"

  social:
    twitter: "https://twitter.com/zaarvyai"
    discord: null
    github: null

  supportEmail: "support@zaarvy.com"

# -----------------------------------------------------------------------------
# TIER & PRODUCT DEFINITIONS
# -----------------------------------------------------------------------------
tiers:
  # Tier progression from lowest to highest
  hierarchy:
    - none        # Free tier (no purchase)
    - core        # Entry-level paid tier
    - growth      # Mid-level tier
    - quantum     # Premium tier
    - secret      # Special tier (unlocked via referrals)

  # Product definitions for each purchasable tier
  products:
    - tierKey: "core"
      name: "Core Crew"
      priceCents: 999                    # $9.99
      agentCount: 7
      templateCount: 70
      features:
        - "7 specialized AI agents"
        - "70+ advanced prompt templates"
        - "Smart launchpad command center"
        - "Lifetime access, no subscriptions"
        - "One-click agent deployment"
      orderBump:
        enabled: true
        targetTier: "growth"
        discountCents: 300               # Save $3 on upgrade
      displayOrder: 1
      isActive: true

    - tierKey: "growth"
      name: "Growth Guild"
      priceCents: 2499                   # $24.99
      agentCount: 14
      templateCount: 140
      features:
        - "14 specialized AI agents (Core + Growth)"
        - "140+ advanced prompt templates"
        - "Smart launchpad command center"
        - "Lifetime access, no subscriptions"
        - "Priority feature updates"
        - "Community access"
      orderBump:
        enabled: true
        targetTier: "quantum"
        discountCents: 500               # Save $5 on upgrade
      displayOrder: 2
      isActive: true

    - tierKey: "quantum"
      name: "Quantum Collective"
      priceCents: 5499                   # $54.99
      agentCount: 26
      templateCount: 260
      features:
        - "All 26 specialized AI agents"
        - "260+ advanced prompt templates"
        - "Smart launchpad command center"
        - "Lifetime access, no subscriptions"
        - "VIP priority support"
        - "Early access to new agents"
        - "Exclusive quantum-tier agents"
      orderBump:
        enabled: false
      displayOrder: 3
      isActive: true

    - tierKey: "secret"
      name: "Secret Agents"
      priceCents: 0                      # Not purchasable directly
      agentCount: 5
      templateCount: 50
      features:
        - "5 exclusive mystery agents"
        - "Unlocked via referral program"
        - "Unique capabilities"
      orderBump:
        enabled: false
      displayOrder: 99
      isActive: false                    # Hidden from normal UI

# -----------------------------------------------------------------------------
# AGENT DEFINITIONS
